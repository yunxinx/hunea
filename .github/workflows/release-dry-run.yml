name: release-dry-run

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to stage in npm packages
        required: true
        default: 0.10.0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            zigbuild: false
          - target: aarch64-apple-darwin
            runner: macos-15
            zigbuild: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            zigbuild: false
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zigbuild
        shell: bash
        env:
          ZIG_VERSION: 0.15.2
          ZIG_SHA256: 02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239
        run: |
          set -euo pipefail
          archive="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          url="https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          install_dir="${RUNNER_TEMP}/zig"

          curl -fsSLo "${RUNNER_TEMP}/${archive}" "${url}"
          echo "${ZIG_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check

          mkdir -p "${install_dir}"
          tar -xJf "${RUNNER_TEMP}/${archive}" --strip-components=1 -C "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/zig" version

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install --locked cargo-zigbuild --version 0.23.0

      - name: Build Linux musl binary
        if: matrix.zigbuild
        run: cargo zigbuild --release --target "${{ matrix.target }}" --bin hunea

      - name: Build native binary
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target "${{ matrix.target }}" --bin hunea

      - name: Package binary archive
        run: >
          python scripts/release/package_binary.py
          --target "${{ matrix.target }}"
          --release-dir "target/${{ matrix.target }}/release"
          --output-dir "dist/release"

      - uses: actions/upload-artifact@v7
        with:
          name: hunea-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  package:
    name: Package release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          pattern: hunea-*
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Write checksums
        run: |
          set -euo pipefail
          find dist/release -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print |
            sort |
            while IFS= read -r archive; do
              sha256sum "$archive" | awk -v name="$(basename "$archive")" '{ print $1 "  " name }'
            done > dist/release/hunea_SHA256SUMS
          cat dist/release/hunea_SHA256SUMS

      - name: Stage npm packages
        run: >
          python scripts/release/stage_npm_packages.py
          --release-version "${{ inputs.release_version }}"
          --artifacts-dir dist/release
          --output-dir dist/npm

      - uses: actions/upload-artifact@v7
        with:
          name: hunea-release-dry-run
          path: |
            dist/release/*
            dist/npm/*
          if-no-files-found: error
