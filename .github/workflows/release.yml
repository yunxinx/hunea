name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  tag-check:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm_tag: ${{ steps.npm_tag.outputs.npm_tag }}
      is_prerelease: ${{ steps.npm_tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Validate tag against workspace version
        id: version
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "Not a tag ref"; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]] || {
            echo "Tag ${GITHUB_REF_NAME} does not match v<semver> or v<semver>-<alpha|beta|rc>.<n>"
            exit 1
          }
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          [[ "${tag_version}" == "${cargo_version}" ]] || {
            echo "Tag version ${tag_version} does not match Cargo.toml workspace version ${cargo_version}"
            exit 1
          }
          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

      - name: Determine npm dist-tag
        id: npm_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "npm_tag=" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          elif [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)\.[0-9]+$ ]]; then
            prerelease="${VERSION#*-}"
            echo "npm_tag=${prerelease%%.*}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported version for npm publishing: ${VERSION}"
            exit 1
          fi

  quality-gate:
    name: Release quality gate
    needs: tag-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: cargo build

      - uses: taiki-e/install-action@nextest

      - run: cargo nextest run

      - run: cargo fmt --all -- --check

      - run: cargo clippy --workspace --all-targets -- -D warnings

      - uses: taiki-e/install-action@cargo-audit

      - run: cargo audit

  build:
    name: Build ${{ matrix.target }}
    needs: tag-check
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            zigbuild: false
          - target: aarch64-apple-darwin
            runner: macos-15
            zigbuild: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            zigbuild: false
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zigbuild
        shell: bash
        env:
          ZIG_VERSION: 0.15.2
          ZIG_SHA256: 02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239
        run: |
          set -euo pipefail
          archive="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          url="https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          install_dir="${RUNNER_TEMP}/zig"

          curl -fsSLo "${RUNNER_TEMP}/${archive}" "${url}"
          echo "${ZIG_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check

          mkdir -p "${install_dir}"
          tar -xJf "${RUNNER_TEMP}/${archive}" --strip-components=1 -C "${install_dir}"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/zig" version

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install --locked cargo-zigbuild --version 0.23.0

      - name: Build Linux musl binary
        if: matrix.zigbuild
        run: cargo zigbuild --release --target "${{ matrix.target }}" --bin hunea

      - name: Build native binary
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target "${{ matrix.target }}" --bin hunea

      - name: Package binary archive
        run: >
          python scripts/release/package_binary.py
          --target "${{ matrix.target }}"
          --release-dir "target/${{ matrix.target }}/release"
          --output-dir "dist/release"

      - uses: actions/upload-artifact@v7
        with:
          name: hunea-${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  release-assets:
    name: Assemble GitHub Release assets
    needs:
      - tag-check
      - quality-gate
      - build
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ needs.tag-check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          path: dist/release
          pattern: hunea-*
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Write checksums
        run: |
          set -euo pipefail
          find dist/release -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print |
            sort |
            while IFS= read -r archive; do
              sha256sum "$archive" | awk -v name="$(basename "$archive")" '{ print $1 "  " name }'
            done > dist/release/hunea_SHA256SUMS
          cat dist/release/hunea_SHA256SUMS

      - name: Stage npm packages
        run: >
          python scripts/release/stage_npm_packages.py
          --release-version "${{ needs.tag-check.outputs.version }}"
          --artifacts-dir dist/release
          --output-dir dist/npm

      - name: Generate release notes
        run: |
          set -euo pipefail
          notes="${RUNNER_TEMP}/release-notes.md"
          if [[ -f CHANGELOG.md ]]; then
            awk '
              /^## / {
                if (seen) exit
                if ($0 ~ /^## \\[?Unreleased\\]?/) { seen=1; next }
              }
              seen { print }
            ' CHANGELOG.md > "$notes"
          fi
          if [[ ! -s "$notes" ]]; then
            git log -1 --format=%B "${GITHUB_SHA}^{commit}" > "$notes"
          fi
          echo >> "$notes"
          echo "RELEASE_NOTES=${notes}" >> "$GITHUB_ENV"

      - name: Attest release archives
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/hunea_SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.tag-check.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ env.RELEASE_NOTES }}
          files: |
            dist/release/*
            dist/npm/*
          make_latest: ${{ needs.tag-check.outputs.is_prerelease == 'false' }}
          prerelease: ${{ needs.tag-check.outputs.is_prerelease == 'true' }}

      - uses: actions/upload-artifact@v7
        with:
          name: hunea-npm-tarballs
          path: dist/npm/*.tgz
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs:
      - tag-check
      - release-assets
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: hunea-npm-tarballs
          path: dist/npm

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish platform packages then root package
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
          NPM_TAG: ${{ needs.tag-check.outputs.npm_tag }}
        run: |
          set -euo pipefail
          tarballs=(
            "dist/npm/hunea-linux-x64-${VERSION}.tgz"
            "dist/npm/hunea-linux-arm64-${VERSION}.tgz"
            "dist/npm/hunea-darwin-x64-${VERSION}.tgz"
            "dist/npm/hunea-darwin-arm64-${VERSION}.tgz"
            "dist/npm/hunea-win32-x64-${VERSION}.tgz"
            "dist/npm/hunea-${VERSION}.tgz"
          )

          for tarball in "${tarballs[@]}"; do
            [[ -f "$tarball" ]] || { echo "Missing npm tarball: $tarball"; exit 1; }
          done

          for tarball in "${tarballs[@]}"; do
            publish_cmd=(npm publish "${GITHUB_WORKSPACE}/${tarball}")
            if [[ -n "${NPM_TAG}" ]]; then
              publish_cmd+=(--tag "${NPM_TAG}")
            fi

            echo "+ ${publish_cmd[*]}"
            set +e
            publish_output="$("${publish_cmd[@]}" 2>&1)"
            publish_status=$?
            set -e
            echo "${publish_output}"

            if [[ ${publish_status} -eq 0 ]]; then
              continue
            fi
            if grep -qiE "previously published|cannot publish over|version already exists" <<< "${publish_output}"; then
              echo "Skipping already-published package version for ${tarball}"
              continue
            fi
            exit "${publish_status}"
          done

  post-publish-smoke:
    name: Post-publish npm smoke
    needs:
      - tag-check
      - publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm install
        env:
          VERSION: ${{ needs.tag-check.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            if npm view "hunea@${VERSION}" version; then
              break
            fi
            if [[ "${attempt}" -eq 10 ]]; then
              exit 1
            fi
            sleep 15
          done

          for attempt in {1..5}; do
            if npm install -g "hunea@${VERSION}"; then
              break
            fi
            if [[ "${attempt}" -eq 5 ]]; then
              exit 1
            fi
            sleep 15
          done
          hunea --version
