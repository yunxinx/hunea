[package]
name = "lumos"
version = "0.1.0"
edition = "2024"

[features]
default = []
bench-support = []

[[bench]]
name = "frontend_tui"
harness = false
required-features = ["bench-support"]

[dependencies]
color-eyre = "0.6.5"
crossterm = "0.29.0"
ratatui = { version = "0.30.0", features = ["crossterm_0_29"] }
terminal-light = "1.8.0"
pulldown-cmark = "0.13.3"
unicode-segmentation = "1.13.2"
unicode-width = "0.2.2"
directories = "6"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
arboard = { version = "3.6.1", features = ["wayland-data-control"] }
base64 = "0.22.1"

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }
