[package]
name = "lumos"
version = "0.1.0"
edition = "2024"

[features]
default = []
bench-support = []

[[bench]]
name = "frontend_tui"
harness = false
required-features = ["bench-support"]

[dependencies]
color-eyre = "0.6.5"
crossterm = "0.29.0"
ratatui = { version = "0.30.0", features = ["crossterm_0_29"] }
terminal-light = "1.8.0"
pulldown-cmark = "0.13.3"
percent-encoding = "2"
syntect = "5"
two-face = "0.5.1"
url = "2"
unicode-segmentation = "1.13.2"
unicode-width = "0.2.2"
directories = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1.1.2"
toml_edit = "0.23.9"
arboard = { version = "3.6.1", features = ["wayland-data-control"] }
base64 = "0.22.1"
agent-client-protocol = "0.11.1"
tokio = { version = "1.52.1", features = ["process", "rt", "macros", "io-util", "time", "sync"] }
tokio-util = { version = "0.7.18", features = ["compat"] }

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }
