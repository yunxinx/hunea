# Lumos ACP 配置示例
#
# 使用方式：
# 1. 复制本文件为用户级 ACP 配置：~/.config/lumos/acp.toml
#    或项目级 ACP 配置：./.lumos/acp.toml
# 2. 将 enabled 改为 true
# 3. 启动 lumos，在 TUI 中使用 /acp 选择本次要使用的 Agent
#
# 注意：ACP 配置是独立文件 acp.toml，不写入 config.toml。
# config.toml 只保留 TUI 等主应用配置。

# ACP 总开关。默认建议保持 false，确认要接入 ACP Agent 后再打开。
enabled = false

# ACP Registry 地址；可以改成私有 registry。
registry_url = "https://cdn.agentclientprotocol.com/registry/v1/latest/registry.json"

# 安装位置策略：
# - "config"：安装到用户配置目录下的 .acpclient，默认推荐，便于人工检查
# - "data"：安装到平台标准数据目录
# - "cache"：安装到平台标准缓存目录
# - "project"：安装到当前项目 .lumos/.acpclient
# - "custom"：安装到 custom_install_dir 指定目录
install_root = "config"

# install_root = "custom" 时生效；其他策略下保持空字符串即可。
custom_install_dir = ""

# 第一版只支持 binary；后续可扩展为 ["npx", "binary"] 等优先级。
distribution_preference = ["binary"]

# 启动时检查 registry 版本更新。
# 如果有更新，TUI 会提示“更新 / 不更新 / 关闭自动更新检查”。
auto_update_check = true

# Registry 来源：由 Lumos 按 registry metadata 下载并启动。
# type = "registry" 时：
# - agent 可省略；省略时默认使用 agent_servers 的 key 作为 registry agent id。
# - command / args 为空时使用 registry 中的 cmd / args。
# - env 会与 registry env 合并，同名 key 以这里为准。
# 常见带 binary 分发的 registry id：kimi、codex-acp、goose、opencode、kilo。
[agent_servers.kimi]
type = "registry"
agent = "kimi"
command = ""
args = []
env = {}

# 可选：传给支持该语义的 Agent，用于默认模型 / 默认模式选择。
# default_model = ""
# default_mode = ""

# 自定义来源：适合已经安装在系统里的 ACP-compatible agent，Lumos 只负责启动并通过 ACP 通信。
# 如果写了 command 且省略 type，Lumos 会按 custom 处理；显式写出 type 更清晰。
# [agent_servers.local-kimi]
# type = "custom"
# command = "kimi"
# args = ["acp"]
# env = {}
