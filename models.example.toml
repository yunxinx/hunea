# Lumos native model configuration example.
#
# Copy this file to `models.toml` and adjust providers for your local model
# server or OpenAI-compatible service. `base_url` should include the `/v1`
# prefix for OpenAI-compatible APIs.
#
# If `models` is present, it is treated as the provider's allowlist.
# If `models` is omitted, Lumos can sync available models from:
#   {base_url}/models

# Empty means Lumos starts with no selected model. When you choose a model from
# /models, Lumos writes the last selected model back here as `provider/model`.
default = ""

[providers.local]
enabled = true
kind = "openai_compatible"
display_name = "Local"
base_url = "http://127.0.0.1:1234/v1"
# Local model servers often do not require Authorization.
# api_key_env = "LOCAL_OPENAI_API_KEY"
models = ["qwen3", "deepseek-r1-distill"]

[providers.deepseek]
enabled = true
kind = "openai_compatible"
display_name = "DeepSeek"
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
models = ["deepseek-chat", "deepseek-reasoner"]

[providers.openai_compatible_auto]
enabled = false
kind = "openai_compatible"
display_name = "Auto Sync Provider"
base_url = "https://api.example.com/v1"
api_key_env = "EXAMPLE_OPENAI_API_KEY"
# Omit `models` to sync from `/v1/models`.
