# Hunea 原生模型配置示例。
#
# 将此文件复制为 `models.toml`，并根据你的本地模型服务器、
# OpenAI 兼容服务或原生 provider 进行调整。`base_url`
# 对于 OpenAI 兼容 API 需要包含 `/v1` 前缀。
#
# 如果设置了 `models`，它将作为该 provider 的模型白名单。如果
# 省略 `models`，OpenAI 兼容 provider 会从 `{base_url}/models` 同步模型列表，
# 原生 provider 则在可用时使用其自身的模型列表接口。
#
# 原生 provider 也可以设置 `base_url` 指向第三方原生兼容端点。
# 这种情况下需要显式配置 `models = [...]`；自定义原生端点
# 尚不支持自动模型同步。

# 留空表示 Hunea 启动时不选择任何模型。当你从 /models 选择模型后，
# Hunea 会将最后选择的模型以 `provider/model` 格式写回此处。
default = ""

[providers.local]
enabled = true
kind = "openai_compatible"
display_name = "Local"
base_url = "http://127.0.0.1:1234/v1"
# 本地模型服务器通常不需要授权。
# 使用 `api_key` 可以将 token 直接写在此文件中，
# 使用 `api_key_env` 则从环境变量读取。如果两者都存在，优先使用 `api_key`。
# api_key = "local-secret"
# api_key_env = "LOCAL_OPENAI_API_KEY"
models = ["qwen3", "deepseek-r1-distill"]

[providers.deepseek]
enabled = true
kind = "deepseek"
display_name = "DeepSeek"
api_key_env = "DEEPSEEK_API_KEY"
models = ["deepseek-chat", "deepseek-reasoner"]

[providers.openai]
enabled = false
kind = "openai"
display_name = "OpenAI"
api_key_env = "OPENAI_API_KEY"
models = ["gpt-4.1", "gpt-4o"]

[providers.anthropic]
enabled = false
kind = "anthropic"
display_name = "Anthropic"
api_key_env = "ANTHROPIC_API_KEY"
models = ["claude-sonnet-4-5"]

# 示例：使用 Anthropic 原生 API 协议的第三方端点。
# 显式白名单会禁用自动模型同步。
# [providers.anthropic_proxy]
# enabled = false
# kind = "anthropic"
# display_name = "Anthropic Proxy"
# base_url = "https://proxy.example.com/anthropic/v1"
# api_key_env = "ANTHROPIC_PROXY_API_KEY"
# models = ["claude-sonnet-4-5"]

[providers.gemini]
enabled = false
kind = "gemini"
display_name = "Gemini"
api_key_env = "GEMINI_API_KEY"
models = ["gemini-2.5-pro"]

[providers.openai_compatible_auto]
enabled = false
kind = "openai_compatible"
display_name = "Auto Sync Provider"
base_url = "https://api.example.com/v1"
api_key = "replace-with-provider-token"
# api_key_env = "EXAMPLE_OPENAI_API_KEY"
# 省略 `models` 以从 `/v1/models` 自动同步。
